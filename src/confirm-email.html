<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email confirmé — DarkOrbit Stats Tracker Pro</title>
  <link rel="stylesheet" href="frontend/variables.css">
  <link rel="stylesheet" href="frontend/style.css">
  <script>
    (function(){ var t = localStorage.getItem('darkOrbitTheme') || 'dark'; document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark'); })();
  </script>
  <style>
    .auth-container { max-width: 420px; margin: 80px auto; padding: 32px; background: var(--bg-secondary); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 8px 32px var(--shadow); }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-header h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .auth-header .auth-icon { font-size: 48px; margin-bottom: 16px; }
    .auth-message { color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; text-align: center; }
    .auth-success { background: rgba(34, 197, 94, 0.15); color: var(--success); padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 20px; text-align: center; }
    .auth-error { background: rgba(239, 68, 68, 0.15); color: var(--danger); padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; display: none; }
    .auth-error.visible { display: block; }
    .auth-submit { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .auth-submit:hover { background: var(--accent-hover); }
    .auth-submit:disabled { opacity: 0.6; cursor: wait; }
    .auth-link { display: block; text-align: center; margin-top: 16px; color: var(--accent); font-size: 0.9rem; text-decoration: none; cursor: pointer; }
    .auth-link:hover { text-decoration: underline; }
    .auth-loading { text-align: center; padding: 24px; color: var(--text-muted); }
    .auth-loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-header">
    <div class="auth-icon" id="confirmIcon">✉️</div>
    <h1 id="confirmTitle">Confirmation de votre email</h1>
    <p id="confirmSubtitle">Traitement en cours...</p>
  </div>

  <div id="authError" class="auth-error"></div>
  <div id="authSuccess" class="auth-success" style="display: none;"></div>

  <div id="loadingState" class="auth-loading">
    <div class="spinner"></div>
    <p>Vérification en cours...</p>
  </div>

  <div id="successState" style="display: none;">
    <p class="auth-message">
      Votre adresse email a été confirmée avec succès.<br>
      Vous allez être redirigé vers l'application.
    </p>
    <button type="button" class="auth-submit" id="goToAppBtn">Accéder à l'application</button>
  </div>

  <div id="errorState" style="display: none;">
    <p class="auth-message" id="errorMessage">
      Une erreur s'est produite lors de la confirmation.
    </p>
    <a href="auth.html" class="auth-link">Retour à la connexion</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="backend/supabase-config.js"></script>
<script src="backend/supabase-client.js"></script>
<script src="config/keys.js"></script>
<script>
(function() {
  const loadingEl = document.getElementById('loadingState');
  const successEl = document.getElementById('successState');
  const errorEl = document.getElementById('errorState');
  const authErrorEl = document.getElementById('authError');
  const authSuccessEl = document.getElementById('authSuccess');
  const confirmIcon = document.getElementById('confirmIcon');
  const confirmTitle = document.getElementById('confirmTitle');
  const confirmSubtitle = document.getElementById('confirmSubtitle');
  const goToAppBtn = document.getElementById('goToAppBtn');

  function show(state) {
    loadingEl.style.display = state === 'loading' ? 'block' : 'none';
    successEl.style.display = state === 'success' ? 'block' : 'none';
    errorEl.style.display = state === 'error' ? 'block' : 'none';
  }

  function setError(msg) {
    if (authErrorEl) {
      authErrorEl.textContent = msg;
      authErrorEl.classList.add('visible');
    }
    if (authSuccessEl) authSuccessEl.style.display = 'none';
  }

  function setSuccess(msg) {
    if (authSuccessEl) {
      authSuccessEl.textContent = msg;
      authSuccessEl.style.display = 'block';
    }
    if (authErrorEl) authErrorEl.classList.remove('visible');
  }

  document.addEventListener('DOMContentLoaded', async function() {
    var supabase = typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;
    if (!supabase) {
      setError('Supabase non configuré.');
      show('error');
      return;
    }

    var hash = window.location.hash || '';
    var query = window.location.search || '';
    var hasTokenInHash = hash.indexOf('access_token') !== -1 || hash.indexOf('token=') !== -1;
    var hasTokenInQuery = query.indexOf('access_token') !== -1 || query.indexOf('token=') !== -1;

    if (!hasTokenInHash && !hasTokenInQuery) {
      setError('Lien de confirmation invalide ou déjà utilisé.');
      show('error');
      confirmIcon.textContent = '⚠️';
      confirmTitle.textContent = 'Lien invalide';
      confirmSubtitle.textContent = '';
      return;
    }

    /* Supabase traite automatiquement le hash au chargement. Attendre un tick puis vérifier la session. */
    await new Promise(function(r) { setTimeout(r, 100); });
    var { data: sessionData } = await supabase.auth.getSession();
    var session = sessionData && sessionData.session;

    if (session) {
      confirmIcon.textContent = '✅';
      confirmTitle.textContent = 'Email confirmé !';
      confirmSubtitle.textContent = 'Bienvenue dans DarkOrbit Stats Tracker Pro';
      setSuccess('Votre compte est maintenant actif.');
      show('success');

      if (goToAppBtn) goToAppBtn.addEventListener('click', function() {
        window.location.href = 'index.html';
      });

      setTimeout(function() {
        window.location.href = 'index.html';
      }, 3000);
    } else {
      setError('Lien expiré ou invalide. Demandez un nouvel email de confirmation.');
      show('error');
      confirmIcon.textContent = '⚠️';
      confirmTitle.textContent = 'Confirmation impossible';
      confirmSubtitle.textContent = '';
    }
  });
})();
</script>
</body>
</html>
